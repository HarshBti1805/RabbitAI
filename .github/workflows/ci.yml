name: CI – Build & Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ════════════════════════════════════════════════════
  #  Backend
  # ════════════════════════════════════════════════════
  backend:
    name: "Backend: Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint (flake8)
        run: flake8 app/ --max-line-length=120 --ignore=E501,W503,E402

      - name: Verify FastAPI app imports
        env:
          OPENAI_API_KEY: "test-key-for-ci"
          SMTP_USER: "ci@test.com"
          SMTP_PASSWORD: "ci-pass"
        run: python -c "from app.main import app; print('App imports OK'); print([r.path for r in app.routes])"

      - name: Build Docker image
        run: docker build -t sia-backend:ci .

  # ════════════════════════════════════════════════════
  #  Frontend
  # ════════════════════════════════════════════════════
  frontend:
    name: "Frontend: Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Build Docker image
        run: docker build -t sia-frontend:ci .
